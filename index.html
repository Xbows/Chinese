<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#12141a">
<title>Big Two — Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12141a;
  --panel:#1d212a;
  --panel-2:#262b35;
  --line:#323849;
  --felt-a:#34b86a;
  --felt-b:#0e5a32;
  --gold:#f0b93d;
  --gold-deep:#c4881e;
  --gold-light:#ffd97a;
  --red:#e05560;
  --red-deep:#a8323d;
  --ink:#14171c;
  --white:#f3f5f7;
  --muted:#8b93a3;
  --card-red:#d6303d;
  --card-ink:#181b20;
  --card-w:50px;
  --card-h:71px;
  --card-overlap:-28px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }
html,body{ height:100%; overflow:hidden; touch-action:manipulation; overscroll-behavior:none; }
body{
  background:radial-gradient(circle at 50% -10%, #20242e 0%, #11131a 65%);
  font-family:'Cairo',sans-serif; color:var(--white);
  display:flex; flex-direction:column; height:100dvh;
}

.screen{ position:fixed; inset:0; z-index:500; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:24px; padding-top:calc(24px + var(--safe-t)); padding-bottom:calc(24px + var(--safe-b)); }
.screen.hidden{ display:none !important; }

.panel{ background:var(--panel); border:1px solid var(--line); border-radius:24px; padding:30px 24px; width:100%; max-width:400px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.45); }
.panel h1{ color:var(--gold); font-size:38px; font-weight:900; letter-spacing:3px; line-height:1; }
.panel .sub{ color:var(--muted); font-size:11px; letter-spacing:4px; margin:6px 0 26px; font-weight:700; }

input[type=text]{
  width:100%; padding:14px 16px; border-radius:14px;
  background:var(--panel-2); border:1.5px solid var(--line); color:var(--white);
  font-family:'Cairo',sans-serif; font-size:16px; font-weight:600;
  margin-bottom:12px; outline:none; transition:border-color .15s;
}
input[type=text]:focus{ border-color:var(--gold-deep); }
input[type=text]::placeholder{ color:var(--muted); }

.btn{ width:100%; padding:14px; border-radius:30px; border:none; font-family:'Cairo',sans-serif; font-weight:900; font-size:15px; letter-spacing:.5px; cursor:pointer; transition:transform .1s; margin-bottom:10px; }
.btn-gold{ background:linear-gradient(160deg,var(--gold),var(--gold-deep)); color:#241a02; box-shadow:0 4px 0 #7a5612; }
.btn-gold:active{ transform:translateY(3px); box-shadow:0 1px 0 #7a5612; }
.btn-ghost{ background:transparent; border:1.5px solid var(--line); color:var(--muted); }
.btn-ghost:hover{ border-color:var(--gold-deep); color:var(--gold-light); }
.btn-green{ background:linear-gradient(160deg,#37c172,#198a47); color:#fff; box-shadow:0 4px 0 #0e4a26; }
.btn-green:active{ transform:translateY(3px); box-shadow:0 1px 0 #0e4a26; }
.btn:disabled{ opacity:.35; pointer-events:none; }

.divider{ display:flex; align-items:center; gap:10px; margin:16px 0; color:var(--muted); font-size:11px; font-weight:700; letter-spacing:1px; }
.divider::before,.divider::after{ content:''; flex:1; height:1px; background:var(--line); }

.room-list{ max-height:220px; overflow-y:auto; margin:10px 0; }
.room-item{ display:flex; align-items:center; justify-content:space-between; padding:13px 16px; background:var(--panel-2); border-radius:14px; margin-bottom:8px; cursor:pointer; border:1.5px solid transparent; transition:border-color .15s; }
.room-item:hover{ border-color:var(--gold-deep); }
.room-name{ font-weight:700; color:var(--white); font-size:14px; }
.room-meta{ font-size:11px; color:var(--muted); margin-top:2px; }
.room-badge{ font-size:10px; font-weight:800; padding:4px 10px; border-radius:20px; letter-spacing:.5px; }
.badge-open{ background:#11401f; color:#52d889; }
.badge-full{ background:#402112; color:#e98c52; }
.badge-playing{ background:#1b1a40; color:#8484f5; }

.seat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:18px 0; }
.seat{ background:var(--panel-2); border:1.5px dashed var(--line); border-radius:16px; padding:14px; text-align:center; min-height:84px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.seat.filled{ border-style:solid; border-color:var(--line); }
.seat.me{ border-color:var(--gold); }
.seat-avatar{ font-size:26px; margin-bottom:4px; }
.seat-name{ font-size:12px; font-weight:700; color:var(--gold-light); }
.seat-empty{ font-size:11px; color:#4a5566; font-weight:600; }
.spectator-list{ font-size:11px; color:var(--muted); margin-top:6px; }

/* ── TOP BAR ── */
#top-bar{
  height:auto; min-height:60px; background:rgba(10,12,16,.55); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px; padding-top:calc(10px + var(--safe-t));
  border-bottom:1px solid var(--line); flex-shrink:0; z-index:100;
}
.score-box{ background:var(--white); color:var(--ink); border-radius:14px; padding:6px 16px; display:flex; flex-direction:column; align-items:flex-start; min-width:58px; box-shadow:0 4px 10px rgba(0,0,0,.3); }
.score-box .num{ font-size:21px; font-weight:900; line-height:1; }
.score-box .lbl{ font-size:9px; letter-spacing:1.5px; color:#6b7280; font-weight:700; margin-top:2px; }
.icon-cluster{ display:flex; gap:8px; }
.icon-btn{ width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); color:var(--white); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .1s, background .15s; }
.icon-btn:active{ transform:scale(.9); background:rgba(255,255,255,.18); }

/* ── TABLE ── */
#table-wrap{ flex:1; position:relative; padding:34px 16px 10px; display:flex; }
#game-table{
  flex:1; position:relative; border-radius:26px;
  background:radial-gradient(ellipse at 50% 28%, var(--felt-a) 0%, var(--felt-b) 85%);
  border:3px solid rgba(255,255,255,.13);
  box-shadow:inset 0 0 46px rgba(0,0,0,.28), 0 14px 32px rgba(0,0,0,.45);
}
#spectator-banner{ position:absolute; top:-1px; left:14px; right:14px; background:rgba(58,134,255,.18); border:1px solid #3a86ff; border-radius:0 0 12px 12px; padding:5px; text-align:center; font-size:11px; color:#7eb0ff; font-weight:800; letter-spacing:2px; display:none; }

.player-slot{ position:absolute; display:flex; flex-direction:column; align-items:center; gap:4px; z-index:5; }
.slot-top{ top:-22px; left:50%; transform:translateX(-50%); }
.slot-left{ left:-16px; top:50%; transform:translateY(-50%); }
.slot-right{ right:-16px; top:50%; transform:translateY(-50%); }

.card-stack{ display:flex; }
.card-stack.empty{ opacity:0; }
.stack-card{ width:21px; height:29px; border-radius:4px; background:linear-gradient(135deg,var(--red),var(--red-deep)); border:1px solid rgba(255,255,255,.35); box-shadow:1px 2px 4px rgba(0,0,0,.4); }
.stack-h{ flex-direction:row; }
.stack-h .stack-card:not(:first-child){ margin-left:-10px; }
.stack-h .stack-card:nth-child(2){ transform:rotate(4deg); }
.stack-h .stack-card:nth-child(3){ transform:rotate(-4deg); }
.stack-v{ flex-direction:column; }
.stack-v .stack-card:not(:first-child){ margin-top:-18px; }
.stack-v .stack-card:nth-child(2){ transform:rotate(3deg); }
.stack-v .stack-card:nth-child(3){ transform:rotate(-3deg); }

.avatar-frame{
  width:52px; height:52px; border-radius:50%; background:#0f1115;
  border:2.5px solid rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center;
  font-size:22px; position:relative; transition:border-color .2s, box-shadow .2s, transform .2s;
}
.av-emoji{ pointer-events:none; }
.active-glow{ border-color:var(--gold-light); box-shadow:0 0 16px var(--gold); transform:scale(1.08); }
.card-bubble{ position:absolute; bottom:-4px; right:-4px; background:var(--red); color:#fff; border-radius:50%; width:20px; height:20px; font-size:10px; font-weight:900; display:flex; align-items:center; justify-content:center; border:2px solid var(--bg); }
.player-name-tag{ font-size:11px; font-weight:700; color:#c9cdd4; background:rgba(0,0,0,.45); padding:3px 10px; border-radius:10px; white-space:nowrap; max-width:96px; overflow:hidden; text-overflow:ellipsis; }
.tag-active{ color:var(--gold-light); background:rgba(0,0,0,.6); }

.play-zone{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:70%; min-height:110px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.last-played-by{ font-size:11px; color:#bfe8cf; margin-bottom:6px; font-weight:700; letter-spacing:.5px; }
#played-cards{ display:flex; gap:6px; align-items:center; justify-content:center; flex-wrap:wrap; }
.free-play-banner{ font-size:12px; font-weight:800; color:var(--gold-light); letter-spacing:2px; background:rgba(0,0,0,.25); padding:6px 14px; border-radius:20px; }

.turn-indicator{ position:absolute; bottom:10px; left:50%; transform:translateX(-50%); font-size:11px; font-weight:800; letter-spacing:1.5px; background:rgba(0,0,0,.55); padding:5px 16px; border-radius:14px; color:var(--gold-light); pointer-events:none; z-index:5; }

.card{
  width:var(--card-w); height:var(--card-h); background:var(--white); border-radius:11px; color:var(--card-ink);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
  box-shadow:0 3px 8px rgba(0,0,0,.45); border:1px solid rgba(0,0,0,.06);
  transition:transform .12s, box-shadow .12s; cursor:pointer; user-select:none; flex-shrink:0;
}
.card.red-suit{ color:var(--card-red); }
.card.table-card{ cursor:default; width:46px; height:64px; }
.card.selected{ transform:translateY(-20px); box-shadow:0 0 0 2.5px var(--gold), 0 8px 14px rgba(0,0,0,.5); }
.card .r{ font-size:18px; font-weight:900; line-height:1; }
.card .s{ font-size:16px; line-height:1; }
.card.table-card .r{ font-size:16px; }
.card.table-card .s{ font-size:14px; }

#human-area{ background:linear-gradient(to top, rgba(0,0,0,.82) 55%, transparent); padding:10px 0 0; padding-bottom:calc(10px + var(--safe-b)); flex-shrink:0; }
#hand{ display:flex; align-items:flex-end; justify-content:center; padding:0 10px 6px; overflow-x:auto; min-height:calc(var(--card-h) + 22px); }
.hand-card{ margin-left:var(--card-overlap); }
.hand-card:first-child{ margin-left:0; }

.action-row{ display:flex; gap:10px; justify-content:center; padding:8px 18px 0; }
.action-btn{ flex:1; max-width:170px; padding:13px; border-radius:28px; border:none; font-family:'Cairo',sans-serif; font-weight:900; font-size:15px; letter-spacing:.5px; cursor:pointer; transition:transform .1s; }
.btn-pass-action{ background:#262b35; color:#9aa3b2; box-shadow:0 4px 0 #11141a; }
.btn-play-action{ background:linear-gradient(to bottom,#37c172,#198a47); color:#fff; box-shadow:0 4px 0 #0e4a26; }
.action-btn:active{ transform:translateY(3px); box-shadow:none !important; }
.action-btn:disabled{ opacity:.3; pointer-events:none; }

.toast{ position:fixed; top:calc(70px + var(--safe-t)); left:50%; transform:translateX(-50%); background:rgba(224,85,96,.96); padding:10px 22px; border-radius:24px; font-weight:800; z-index:9999; display:none; box-shadow:0 8px 18px rgba(0,0,0,.5); white-space:nowrap; font-size:13px; letter-spacing:.5px; }

#modal{ position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:800; display:none; align-items:center; justify-content:center; padding:20px; }
#modal.show{ display:flex; }
.modal-panel{ background:var(--panel); border:1px solid var(--line); border-radius:22px; padding:26px 22px; width:100%; max-width:400px; max-height:88vh; overflow-y:auto; }
.modal-title{ font-size:21px; font-weight:900; color:var(--gold); margin-bottom:18px; }

.score-table{ width:100%; border-collapse:collapse; margin-bottom:18px; }
.score-table th{ font-size:10px; color:var(--muted); font-weight:700; padding:6px 8px; text-align:left; border-bottom:1px solid var(--line); letter-spacing:1px; }
.score-table td{ padding:10px 8px; font-weight:700; border-bottom:1px solid #1a1e26; font-size:13px; }
.score-table tr:last-child td{ border-bottom:none; }
.score-table .player-cell{ display:flex; align-items:center; gap:8px; }
.score-table .me-marker{ font-size:9px; background:#11401f; color:#52d889; padding:2px 6px; border-radius:8px; }
.score-table .gain{ color:var(--red); font-size:13px; }
.score-table .total{ color:var(--gold-light); font-size:15px; }
.score-table tr.winner-row td{ background:rgba(55,193,114,.08); }
.penalty-note{ font-size:11px; color:var(--muted); margin-bottom:16px; line-height:1.6; text-align:left; }
.game-over-banner{ text-align:center; padding:16px; background:linear-gradient(135deg,#173a14,#0a230a); border-radius:14px; margin-bottom:16px; }
.game-over-banner .winner-name{ font-size:19px; font-weight:900; color:#52d889; }
.game-over-banner .winner-sub{ font-size:11px; color:var(--muted); margin-top:4px; }

.combo-guide{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px; font-size:11px; }
.combo-row{ display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:var(--panel-2); border-radius:10px; }
.combo-name{ font-weight:700; color:var(--gold-light); min-width:90px; }
.combo-desc{ color:var(--muted); }

.conn-dot{ width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; }
.conn-dot.connected{ background:#52d889; }
.conn-dot.connecting{ background:var(--gold); animation:pulse 1s infinite; }
.conn-dot.disconnected{ background:var(--red); }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.3} }

::-webkit-scrollbar{ width:4px; height:4px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:#2a3242; border-radius:2px; }

@media(max-width:380px){
  .panel{ padding:24px 18px; }
  .panel h1{ font-size:32px; }
  .avatar-frame{ width:46px; height:46px; font-size:19px; }
}
</style>
</head>
<body>

<!-- SCREEN: PROFILE -->
<div class="screen" id="screen-profile">
  <div class="panel">
    <h1>BIG TWO</h1>
    <p class="sub">ONLINE MULTIPLAYER</p>
    <input type="text" id="inp-name" placeholder="YOUR NAME" maxlength="16" autocomplete="off">
    <input type="text" id="inp-avatar" placeholder="YOUR AVATAR EMOJI 🃏" maxlength="2">
    <button class="btn btn-gold" onclick="saveProfile()">ENTER LOBBY</button>
  </div>
</div>

<!-- SCREEN: LOBBY -->
<div class="screen hidden" id="screen-lobby">
  <div class="panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <div style="text-align:left;">
        <div style="font-size:12px;color:var(--muted);">Playing as</div>
        <div style="font-size:17px;font-weight:900;" id="lobby-greeting">—</div>
      </div>
      <div style="display:flex;align-items:center;">
        <span class="conn-dot connecting" id="conn-dot"></span>
        <span style="font-size:11px;color:var(--muted);" id="conn-label">Connecting…</span>
      </div>
    </div>
    <button class="btn btn-gold" onclick="createRoom()">+ CREATE TABLE</button>
    <div class="divider">OR JOIN</div>
    <input type="text" id="inp-room-code" placeholder="ROOM CODE (6 chars)" maxlength="6" style="text-transform:uppercase;letter-spacing:3px;">
    <button class="btn btn-green" onclick="joinByCode()">JOIN TABLE</button>
    <div class="divider">LIVE TABLES</div>
    <div class="room-list" id="room-list">
      <div style="color:var(--muted);font-size:13px;padding:20px;">Loading tables…</div>
    </div>
    <button class="btn btn-ghost" style="margin-top:4px;" onclick="showRules()">📖 HOW TO PLAY</button>
    <button class="btn btn-ghost" style="font-size:12px;" onclick="showScreen('screen-profile')">Change profile</button>
  </div>
</div>

<!-- SCREEN: WAITING ROOM -->
<div class="screen hidden" id="screen-waiting">
  <div class="panel">
    <div style="margin-bottom:4px;font-size:11px;color:var(--muted);letter-spacing:2px;font-weight:700;">ROOM CODE</div>
    <div id="room-code-display" style="font-size:30px;font-weight:900;color:var(--gold);letter-spacing:7px;margin-bottom:18px;">——</div>
    <div class="seat-grid" id="seat-grid"></div>
    <div class="spectator-list" id="waiting-spectators"></div>
    <div style="margin-top:14px;" id="waiting-actions">
      <button class="btn btn-gold" id="btn-start" onclick="hostStartGame()" style="display:none;">START GAME</button>
      <div style="font-size:12px;color:var(--muted);margin-top:8px;" id="waiting-hint">Waiting for host…</div>
    </div>
    <button class="btn btn-ghost" style="font-size:12px;margin-top:8px;" onclick="leaveRoom()">Leave table</button>
  </div>
</div>

<!-- TOP BAR -->
<div id="top-bar" style="display:none;">
  <div class="score-box">
    <div class="num" id="my-score-num">0</div>
    <div class="lbl">DEAL <span id="deal-num">1</span></div>
  </div>
  <div class="icon-cluster">
    <button class="icon-btn" onclick="shareRoomCode()" title="Invite">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"></circle><path d="M3.5 19c0-3.3 2.6-5.6 5.5-5.6s5.5 2.3 5.5 5.6"></path><line x1="18" y1="9" x2="18" y2="15"></line><line x1="15" y1="12" x2="21" y2="12"></line></svg>
    </button>
    <button class="icon-btn" onclick="leaveRoom()" title="Leave">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4"></path><path d="M15 16l4-4-4-4"></path><line x1="19" y1="12" x2="9" y2="12"></line></svg>
    </button>
    <button class="icon-btn" onclick="showRules()" title="Menu">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><circle cx="12" cy="5" r="1.8"></circle><circle cx="12" cy="12" r="1.8"></circle><circle cx="12" cy="19" r="1.8"></circle></svg>
    </button>
  </div>
</div>

<!-- TABLE -->
<div id="table-wrap" style="display:none;">
<div id="game-table">
  <div id="spectator-banner">👁 SPECTATING</div>

  <div class="player-slot slot-top" id="slot-2">
    <div class="card-stack stack-h" id="stack2"><div class="stack-card"></div><div class="stack-card"></div><div class="stack-card"></div></div>
    <div class="avatar-frame" id="av2"><span class="av-emoji">?</span><div class="card-bubble" id="cb2">0</div></div>
    <div class="player-name-tag" id="name2">—</div>
  </div>
  <div class="player-slot slot-left" id="slot-1">
    <div class="card-stack stack-v" id="stack1"><div class="stack-card"></div><div class="stack-card"></div><div class="stack-card"></div></div>
    <div class="avatar-frame" id="av1"><span class="av-emoji">?</span><div class="card-bubble" id="cb1">0</div></div>
    <div class="player-name-tag" id="name1">—</div>
  </div>
  <div class="player-slot slot-right" id="slot-3">
    <div class="card-stack stack-v" id="stack3"><div class="stack-card"></div><div class="stack-card"></div><div class="stack-card"></div></div>
    <div class="avatar-frame" id="av3"><span class="av-emoji">?</span><div class="card-bubble" id="cb3">0</div></div>
    <div class="player-name-tag" id="name3">—</div>
  </div>

  <div class="play-zone">
    <div class="last-played-by" id="last-played-by"></div>
    <div id="played-cards"></div>
    <div class="free-play-banner hidden" id="free-banner">FREE PLAY — ANY CARD</div>
  </div>
  <div class="turn-indicator" id="turn-label">—</div>
</div>
</div>

<div id="human-area" style="display:none;">
  <div id="hand"></div>
  <div class="action-row">
    <button class="action-btn btn-pass-action" id="passBtn" onclick="handlePass()">PASS</button>
    <button class="action-btn btn-play-action" id="playBtn" onclick="handlePlay()">PLAY</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="modal">
  <div class="modal-panel" id="modal-inner"></div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ═══════════════════════════════════════════
   SUPABASE CONFIG

  const myIdx = (room.seats||[]).findIndex(s=>s&&s.uid===ME.uid);
  if(myIdx!==-1){ ME_SEAT=myIdx; ROOM=room; enterWaitingRoom(id); return; }

  const emptyIdx = (room.seats||[]).findIndex(s=>!s);
  if(emptyIdx===-1){
    IS_SPECTATOR=true;
    const specs = [...(room.spectators||[]), {uid:ME.uid,name:ME.name,avatar:ME.avatar}];
    await spClient.from('rooms').update({spectators:specs}).eq('id',id);
    ROOM=room; ROOM.id=id;
    if(room.playing) enterGame(id); else enterWaitingRoom(id);
    return;

  ME_SEAT = emptyIdx;
  const seats = [...(room.seats||[null,null,null,null])];
  seats[emptyIdx] = {uid:ME.uid, name:ME.name, avatar:ME.avatar};
  await spClient.from('rooms').update({seats}).eq('id',id);
  ROOM = {...room, seats};
  enterWaitingRoom(id);
}

/* ══════════════════════════════════════════════
   DEALING  (Fisher–Yates shuffle: correct & fast)
   ══════════════════════════════════════════════ */
function buildDeck(){
  const d=[];
  for(let s of SUITS) for(let r of RANKS) d.push({s,r,v:cardVal({s,r})});
  for(let i=d.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [d[i],d[j]]=[d[j],d[i]];
  }
  return d;
}

function dealNewRound(seats, scores, dealNum){
  const deck = buildDeck();
  const hands = [[],[],[],[]];
  for(let i=0;i<52;i++) hands[i%4].push(deck[i]);
  hands.forEach(h=>h.sort((a,b)=>a.v-b.v));
  const active = seats.map((s,i)=>s?i:-1).filter(i=>i!==-1);
  let firstTurn = active[0];
  for(let i of active) if(hands[i].some(c=>c.r==='3'&&c.s==='D')) firstTurn=i;
  return { hands, table:null, turn:firstTurn, passCount:0, phase:'playing', lastPlayedBy:-1, winner:-1 };
}

/* ══════════════════════════════════════════════
   RENDER  (diff-guarded: a no-op state produces
   zero DOM writes — this is the main lag fix)
   ══════════════════════════════════════════════ */
function fitHandWidth(n){
  if(!n) return;
  const maxTotal = Math.min(window.innerWidth - 20, 540);
  const overlap = 0.56;
  let w = maxTotal / (1 + (n-1)*overlap);
  w = Math.max(34, Math.min(58, w));
  const h = Math.round(w*1.42);
  document.documentElement.style.setProperty('--card-w', w+'px');
  document.documentElement.style.setProperty('--card-h', h+'px');
  document.documentElement.style.setProperty('--card-overlap', (-(w*overlap))+'px');
}

/* ══════════════════════════════════════════════
   CARD LOGIC
   ══════════════════════════════════════════════ */
function classify(cards){
  const n=cards.length;
  if(n===1) return {type:'single',val:cards[0].v,cards};
  if(n===2&&cards[0].r===cards[1].r) return {type:'pair',val:Math.max(cards[0].v,cards[1].v),cards};
  if(n===3&&cards[0].r===cards[1].r&&cards[1].r===cards[2].r) return {type:'triple',val:cards[0].v,cards};
  if(n===5) return classifyFive(cards);
  return null;
}

function classifyFive(cards){
  const sorted=[...cards].sort((a,b)=>a.v-b.v);
  const ranks=sorted.map(c=>RANK_V[c.r]);
  const suits=sorted.map(c=>c.s);
  const isFlush=suits.every(s=>s===suits[0]);
  const rc={}; ranks.forEach(r=>rc[r]=(rc[r]||0)+1);
  const counts=Object.values(rc).sort((a,b)=>b-a);
  const isStraight=ranks.every((r,i)=>i===0||r===ranks[i-1]+1);
  let type='',tier=0;
  if(isFlush&&isStraight){type='straight-flush';tier=8;}
  else if(counts[0]===4){type='four-of-a-kind';tier=7;}
  else if(counts[0]===3&&counts[1]===2){type='full-house';tier=6;}
  else if(isFlush){type='flush';tier=5;}
  else if(isStraight){type='straight';tier=4;}
  else return null;
  return {type,val:tier*1000+sorted[sorted.length-1].v,cards};
}

function canBeat(combo,table){
  if(!table) return true;
  if(combo.cards.length===5&&table.cards.length===5) return combo.val>table.val;
  if(combo.type===table.type) return combo.val>table.val;
  return false;
}

function validatePlay(pIdx,cards,gs){
  if(!cards.length) return {ok:false,msg:'SELECT CARDS'};
  const combo=classify(cards);
  if(!combo) return {ok:false,msg:'INVALID COMBINATION'};
  if(!gs.table&&gs.lastPlayedBy!==-1){
  } else if(!gs.table){
     if(!cards.some(c=>c.r==='3'&&c.s==='D')) return {ok:false,msg:'MUST INCLUDE 3♦'};
  }
  if(gs.table&&!canBeat(combo,gs.table)) return {ok:false,msg:'DOES NOT BEAT TABLE'};
  if(gs.table&&combo.type!==gs.table.type&&!(combo.cards.length===5&&gs.table.cards.length===5))
    return {ok:false,msg:`MUST PLAY ${gs.table.type.toUpperCase()}`};
  const hand=gs.hands[pIdx]||[];
  const remaining=hand.filter(c=>!cards.find(x=>x.v===c.v));
  if(remaining.length===0&&cards.some(c=>c.r==='2')) return {ok:false,msg:'CANNOT END ON A 2'};
  return {ok:true,combo};
}

/* ══════════════════════════════════════════════
   HUMAN ACTIONS  (optimistic local apply removes
   the perceived network round-trip lag for moves)
   ══════════════════════════════════════════════ */
function handlePlay(){
  const myIdx=IS_LOCAL?0:ME_SEAT;
  const gs=IS_LOCAL?LOCAL_GS:GAME_STATE;
  if(!gs||gs.turn!==myIdx) return;
  const hand=IS_LOCAL?LOCAL_HAND:(gs.hands[myIdx]||[]);
  const selectedCards=Array.from(SELECTED).map(i=>hand[i]);
  const {ok,msg,combo}=validatePlay(myIdx,selectedCards,gs);
  if(!ok) return showToast(msg);
  SELECTED.clear();
  if(IS_LOCAL) applyLocalMove(myIdx,combo);
  else { optimisticApplyMove(myIdx,combo); submitMove(myIdx,combo); }
}

function handlePass(){
  const myIdx=IS_LOCAL?0:ME_SEAT;
  const gs=IS_LOCAL?LOCAL_GS:GAME_STATE;
  if(!gs||gs.turn!==myIdx||!gs.table) return;
  SELECTED.clear();
  if(IS_LOCAL) applyLocalPass(myIdx);
  else { optimisticApplyPass(myIdx); submitPass(myIdx); }
}

function optimisticApplyMove(pIdx,combo){
  if(!GAME_STATE) return;
  const gs=GAME_STATE;
  gs.hands[pIdx]=gs.hands[pIdx].filter(c=>!combo.cards.find(x=>x.v===c.v));
  gs.table=combo; gs.lastPlayedBy=pIdx; gs.passCount=0;
  if(gs.hands[pIdx].length===0){ gs.phase='roundOver'; gs.winner=pIdx; }
  else gs.turn=nextActiveSeat(pIdx, ROOM?.seats||[]);
  if(pIdx===ME_SEAT) MY_HAND=[...gs.hands[pIdx]];
  renderGame();
}

function optimisticApplyPass(pIdx){
  if(!GAME_STATE) return;
  const gs=GAME_STATE;
  gs.passCount++;
  if(gs.passCount>=3){ gs.table=null; gs.passCount=0; }
  gs.turn=nextActiveSeat(pIdx, ROOM?.seats||[]);
  renderGame();
}

/* ══════════════════════════════════════════════
   SUPABASE MOVES
   ══════════════════════════════════════════════ */
async function submitMove(pIdx,combo){
  if(!spClient||!ROOM) return;
  const gs=JSON.parse(JSON.stringify(GAME_STATE));
  gs.hands[pIdx]=gs.hands[pIdx].filter(c=>!combo.cards.find(x=>x.v===c.v));
  gs.table=combo; gs.lastPlayedBy=pIdx; gs.passCount=0;
  if(gs.hands[pIdx].length===0){
    gs.winner=pIdx; gs.phase='roundOver';
    const newScores=calcScores(ROOM.scores||[0,0,0,0],gs.hands,ROOM.seats||[]);
    const gameOver=newScores.some(s=>s>=101);
    if(gameOver) gs.phase='gameOver';
    await spClient.from('rooms').update({state:gs,scores:newScores,deal:(ROOM.deal||1)+1}).eq('id',ROOM.id);
  } else {
    gs.turn=nextActiveSeat(pIdx,ROOM.seats||[]);
    await spClient.from('rooms').update({state:gs}).eq('id',ROOM.id);
  }
}

async function submitPass(pIdx){
  if(!spClient||!ROOM) return;
  const gs=JSON.parse(JSON.stringify(GAME_STATE));
  gs.passCount++;
  if(gs.passCount>=3){ gs.table=null; gs.passCount=0; }
  gs.turn=nextActiveSeat(pIdx,ROOM.seats||[]);
  await spClient.from('rooms').update({state:gs}).eq('id',ROOM.id);
}

async function runBotTurn(botIdx){
  if(!spClient||!ROOM||!GAME_STATE||GAME_STATE.turn!==botIdx) return;
  const gs=JSON.parse(JSON.stringify(GAME_STATE));
  const hand=gs.hands[botIdx]||[];
  const move=botChooseMove(botIdx,hand,gs);
  if(move) await submitMove(botIdx,move);
  else await submitPass(botIdx);
}

function nextActiveSeat(from,seats){
  for(let i=1;i<=4;i++){ const idx=(from+i)%4; if(seats[idx]) return idx; }
  return (from+1)%4;
}

function calcScores(current,hands,seats){
  const scores=[...current];
  (seats||[]).forEach((s,i)=>{
    if(!s) return;
    const n=(hands[i]||[]).length;
    const penalty=n===0?0:n>=10?n*3:n>=5?n*2:n;
    scores[i]+=penalty;
  });
  return scores;
}

/* ══════════════════════════════════════════════
   BOT AI
   ══════════════════════════════════════════════ */
function botChooseMove(pIdx,hand,gs){
  if(!gs.table){
    const non2s=hand.filter(c=>c.r!=='2');
    const toPlay=non2s.length?[non2s[0]]:[hand[0]];
    const combo=classify(toPlay);
    const {ok}=validatePlay(pIdx,[...toPlay],gs);
    return ok?combo:null;
  }
  if(gs.table.type==='single'){
    for(const c of hand.filter(c=>c.v>gs.table.val)){
      const a=classify([c]); const {ok}=validatePlay(pIdx,[c],gs);
      if(ok) return a;
    }
  } else if(gs.table.type==='pair'){
    for(let i=0;i<hand.length-1;i++){
      if(hand[i].r===hand[i+1].r){
        const pair=[hand[i],hand[i+1]];
        const a=classify(pair);
        if(a&&a.val>gs.table.val){ const {ok}=validatePlay(pIdx,pair,gs); if(ok) return a; }
      }
    }
  } else if(gs.table.type==='triple'){
    for(let i=0;i<hand.length-2;i++){
      if(hand[i].r===hand[i+1].r&&hand[i+1].r===hand[i+2].r){
        const t=[hand[i],hand[i+1],hand[i+2]];
        const a=classify(t);
        if(a&&a.val>gs.table.val){ const {ok}=validatePlay(pIdx,t,gs); if(ok) return a; }
      }
    }
  }
  return null;
}

/* ══════════════════════════════════════════════
   ROUND / GAME OVER MODALS
   ══════════════════════════════════════════════ */
function showRoundModal(){
  const gs=IS_LOCAL?LOCAL_GS:GAME_STATE;
  const seats=IS_LOCAL?LOCAL_SEATS:(ROOM?.seats||[]);
  const scores=IS_LOCAL?LOCAL_SCORES:(ROOM?.scores||[0,0,0,0]);
  const myIdx=IS_LOCAL?0:ME_SEAT;
  const winner=gs.winner;
  const gameOver=gs.phase==='gameOver'||scores.some(s=>s>=101);

  const rows=seats.map((s,i)=>{
    if(!s) return '';
    const n=(gs.hands[i]||[]).length;
    const p=n===0?0:n>=10?n*3:n>=5?n*2:n;
    return `<tr class="${i===winner?'winner-row':''}">
      <td><div class="player-cell">${s.avatar} ${s.name}${i===myIdx?'<span class="me-marker">YOU</span>':''} ${i===winner?'👑':''}</div></td>
      <td style="text-align:center;">${n}</td>
      <td class="gain" style="text-align:center;">+${p}</td>
      <td class="total" style="text-align:right;">${scores[i]}</td>
    </tr>`;
  }).join('');

  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-title">${gameOver?'🏆 GAME OVER':'ROUND OVER'}</div>
    ${gameOver?`<div class="game-over-banner">
      <div class="winner-name">${seats[winner]?.name||'?'} WINS! 🎉</div>
      <div class="winner-sub">Others forced to 101+ points</div>
    </div>`:''}
    <table class="score-table">
      <tr><th>PLAYER</th><th>CARDS</th><th>PENALTY</th><th>TOTAL</th></tr>
      ${rows}
    </table>
    <div class="penalty-note"><strong style="color:var(--gold-light);">Scoring:</strong>
      1–4 cards ×1 · 5–9 cards ×2 · 10–12 cards ×3 · First to force 101+ pts loses.</div>
    ${gameOver
      ?`<button class="btn btn-gold" onclick="newSession()">NEW SESSION</button>`
      :`<button class="btn btn-gold" onclick="${IS_LOCAL?'nextLocalRound()':'hostNextRound()'}">NEXT DEAL</button>`
    }`;
  document.getElementById('modal').classList.add('show');
}

async function hostNextRound(){
  document.getElementById('modal').classList.remove('show');
  if(!spClient||!ROOM) return;
  if(ROOM.host_uid!==ME.uid) return;
  const state=dealNewRound(ROOM.seats,ROOM.scores||[0,0,0,0],ROOM.deal||1);
  await spClient.from('rooms').update({state,deal:(ROOM.deal||1)+1}).eq('id',ROOM.id);
}

async function newSession(){
  document.getElementById('modal').classList.remove('show');
  if(IS_LOCAL){ resetLocalGame(); return; }
  if(!spClient||!ROOM||ROOM.host_uid!==ME.uid) return;
  await spClient.from('rooms').update({scores:[0,0,0,0],deal:1,playing:false,state:null}).eq('id',ROOM.id);
}

async function leaveRoom(){
  document.getElementById('modal').classList.remove('show');
  if(realtimeChannel && spClient) spClient.removeChannel(realtimeChannel);
  if(spClient&&ROOM&&!IS_LOCAL){
    if(!IS_SPECTATOR&&ME_SEAT!==-1){
      const seats=[...(ROOM.seats||[])]; seats[ME_SEAT]=null;
      await spClient.from('rooms').update({seats}).eq('id',ROOM.id);
    } else if(IS_SPECTATOR){
      const specs=(ROOM.spectators||[]).filter(s=>s.uid!==ME.uid);
      await spClient.from('rooms').update({spectators:specs}).eq('id',ROOM.id);
    }
  }
  ROOM=null; GAME_STATE=null; IS_SPECTATOR=false; SELECTED.clear(); ME_SEAT=-1;
  lastRenderSig=''; lastMyHandSig='__init__';
  document.getElementById('top-bar').style.display='none';
  document.getElementById('table-wrap').style.display='none';
  document.getElementById('human-area').style.display='none';
  initLobby();
}

function shareRoomCode(){
  if(IS_LOCAL||!ROOM||!ROOM.code){ showToast('NOTHING TO SHARE IN LOCAL MODE'); return; }
  const code = ROOM.code;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(()=>showToast('ROOM CODE COPIED: '+code))
      .catch(()=>showToast('ROOM CODE: '+code));
  } else {
    showToast('ROOM CODE: '+code);
  }
}

/* ══════════════════════════════════════════════
   LOCAL MODE
   ══════════════════════════════════════════════ */
let LOCAL_GS=null, LOCAL_HAND=[], LOCAL_SCORES=[0,0,0,0], LOCAL_DEAL=1;
const LOCAL_SEATS=[
  {uid:'p0',name:'You',avatar:'🃏'},
  {uid:'ai1',name:'Alex',avatar:'🤖'},
  {uid:'ai2',name:'Jordan',avatar:'👨‍💼'},
  {uid:'ai3',name:'Sam',avatar:'👩‍💼'},
];

function joinLocalGame(){ IS_LOCAL=true; enterWaitingRoom(null); }

function startLocalGame(){
  LOCAL_SCORES=[0,0,0,0]; LOCAL_DEAL=1;
  LOCAL_SEATS[0].name=ME.name||'You'; LOCAL_SEATS[0].avatar=ME.avatar||'🃏';
  dealLocalRound(); enterGame(null);
}

function dealLocalRound(){
  LOCAL_GS=dealNewRound(LOCAL_SEATS,LOCAL_SCORES,LOCAL_DEAL);
  LOCAL_HAND=[...LOCAL_GS.hands[0]];
  SELECTED.clear();
  lastRenderSig=''; lastMyHandSig='__init__';
  if(LOCAL_GS.turn!==0) setTimeout(runLocalBots,1000);
}

function applyLocalMove(pIdx,combo){
  const gs=LOCAL_GS;
  gs.hands[pIdx]=gs.hands[pIdx].filter(c=>!combo.cards.find(x=>x.v===c.v));
  if(pIdx===0) LOCAL_HAND=[...gs.hands[0]];
  gs.table=combo; gs.lastPlayedBy=pIdx; gs.passCount=0;
  if(gs.hands[pIdx].length===0){
    gs.winner=pIdx; gs.phase='roundOver';
    LOCAL_SCORES=calcScores(LOCAL_SCORES,gs.hands,LOCAL_SEATS);
    renderGame(); showRoundModal(); return;
  }
  gs.turn=nextActiveSeat(pIdx,LOCAL_SEATS);
  renderGame();
  if(gs.turn!==0) setTimeout(runLocalBots,700);
}

function applyLocalPass(pIdx){
  const gs=LOCAL_GS;
  gs.passCount++;
  if(gs.passCount>=3){ gs.table=null; gs.passCount=0; }
  gs.turn=nextActiveSeat(pIdx,LOCAL_SEATS);
  renderGame();
  if(gs.turn!==0) setTimeout(runLocalBots,700);
}

async function runLocalBots(){
  const gs=LOCAL_GS;
  while(gs&&gs.turn!==0&&gs.phase==='playing'){
    const pIdx=gs.turn;
    const hand=[...gs.hands[pIdx]];
    await sleep(500);
    const move=botChooseMove(pIdx,hand,gs);
    if(move) applyLocalMove(pIdx,move);
    else applyLocalPass(pIdx);
    if(gs.phase!=='playing') break;
  }
}

function nextLocalRound(){ document.getElementById('modal').classList.remove('show'); LOCAL_DEAL++; dealLocalRound(); renderGame(); }
function resetLocalGame(){ document.getElementById('modal').classList.remove('show'); LOCAL_SCORES=[0,0,0,0]; LOCAL_DEAL=1; dealLocalRound(); renderGame(); }

window.addEventListener('resize', ()=>{ if(MY_HAND.length||GAME_STATE||LOCAL_GS){ const gs=IS_LOCAL?LOCAL_GS:GAME_STATE; if(gs) fitHandWidth((gs.hands[IS_LOCAL?0:ME_SEAT]||[]).length); } });
